<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProSlice Video Analyzer</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window>" error
      (function() {
        const _fetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: false,
            enumerable: true,
            get: () => _fetch,
            set: () => { console.warn('Prevented attempt to overwrite window.fetch'); }
          });
        } catch (e) {
          console.warn('Could not lock window.fetch:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
